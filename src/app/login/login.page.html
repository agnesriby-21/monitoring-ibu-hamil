<ion-header>

  <ion-toolbar>

    <ion-title>
      Login
    </ion-title>

  </ion-toolbar>

</ion-header>


<ion-content class="ion-padding">

  <ion-item>

    <ion-label position="stacked">
      Email
    </ion-label>

    <ion-input
      type="email"
      [(ngModel)]="email">
    </ion-input>

  </ion-item>


  <ion-item>

    <ion-label position="stacked">
      Password
    </ion-label>

    <ion-input
      type="password"
      [(ngModel)]="password">
    </ion-input>

  </ion-item>


  <p style="color:red;">
    {{ message }}
  </p>


  <ion-button
    expand="block"
    (click)="doLogin()"
    [disabled]="isLoading">

    {{ isLoading ? 'Loading...' : 'Login' }}

  </ion-button>

  <ion-button
    expand="block"
    fill="outline"
    routerLink="/register">

    Register

  </ion-button>

</ion-content>
