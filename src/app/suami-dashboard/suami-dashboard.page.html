<ion-content>
  <div class="container">
    <!-- HEADER -->
    <div class="header">
      <div>
        <h2>Halo, {{ nama }}</h2>
        <p>Pantau kesehatan istri setiap hari</p>
      </div>
    </div>

    <!-- CARD -->
    <div class="pregnancy-card">
      <div class="left">
        <h3>Usia Kehamilan Istri</h3>
        <h1>{{ usia_kehamilan }} Minggu</h1>
        <p>{{ nama_istri }}</p>
        <div class="date-row">HPHT: {{ hpht }}</div>
      </div>
      <div class="right">
        <img src="assets/img/baby.png">
      </div>
    </div>

    <!-- MENU -->
    <div class="menu-grid">
      <div class="menu-item" (click)="goTo('/monitoring-suami')">
        <div class="icon-box">
          <ion-icon name="heart-outline"></ion-icon>
        </div>
        <p>Monitoring</p>
      </div>

      <div class="menu-item" (click)="goTo('/tabs-suami/pemeriksaan')">
        <div class="icon-box">
          <ion-icon name="medkit-outline"></ion-icon>
        </div>
        <p>Pemeriksaan</p>
      </div>

      <div class="menu-item" (click)="goTo('/tabs-suami/checklist')">
        <div class="icon-box">
          <ion-icon name="checkbox-outline"></ion-icon>
        </div>
        <p>Checklist</p>
      </div>

      <div class="menu-item" (click)="goTo('/edukasi')">
        <div class="icon-box">
          <ion-icon name="book-outline"></ion-icon>
        </div>
        <p>Edukasi</p>
      </div>

      <div class="menu-item" (click)="goTo('/profile')">
        <div class="icon-box">
          <ion-icon name="person-outline"></ion-icon>
        </div>
        <p>Profile</p>
      </div>
    </div>
  </div>
</ion-content>
